# 基于 Conventional Commits 自动维护 Release PR、CHANGELOG、版本号与 GitHub Release。
# 若需「release-please 创建的 tag」触发其他 workflow（例如按 tag 发布），请配置仓库 Secret：
# RELEASE_PLEASE_TOKEN（classic PAT，含 repo），否则仅用 github.token 时 GitHub 不会级联触发后续 workflow。
name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
